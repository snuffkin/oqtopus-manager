{% extends "base.html" %}
{% block title %}{{ env.name }} — OQTOPUS Manager{% endblock %}

{% block page_banner %}
<div class="relative overflow-hidden px-8 py-8" style="background: url('/assets/mv_bg.png') center/cover no-repeat; background-color: #2563eb;">
  <svg class="absolute inset-0 w-full h-full" preserveAspectRatio="xMaxYMid slice" viewBox="0 0 900 160" fill="none">
    <circle cx="820" cy="60" r="90" fill="white" fill-opacity="0.06"/>
    <circle cx="820" cy="60" r="50" fill="white" fill-opacity="0.06"/>
    <circle cx="680" cy="90" r="3" fill="white" fill-opacity="0.5"/>
    <circle cx="730" cy="45" r="2.5" fill="white" fill-opacity="0.45"/>
    <circle cx="780" cy="110" r="3.5" fill="white" fill-opacity="0.4"/>
    <circle cx="760" cy="25" r="2" fill="white" fill-opacity="0.35"/>
    <circle cx="640" cy="55" r="2.5" fill="white" fill-opacity="0.35"/>
    <circle cx="820" cy="130" r="2" fill="white" fill-opacity="0.3"/>
    <circle cx="860" cy="75" r="3" fill="white" fill-opacity="0.4"/>
    <line x1="680" y1="90" x2="730" y2="45" stroke="white" stroke-opacity="0.25" stroke-width="1"/>
    <line x1="730" y1="45" x2="780" y2="110" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="730" y1="45" x2="760" y2="25" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="680" y1="90" x2="640" y2="55" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="780" y1="110" x2="820" y2="130" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="760" y1="25" x2="860" y2="75" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
    <line x1="860" y1="75" x2="820" y2="130" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  </svg>
  <div class="relative">
    <a href="/backend" class="inline-flex items-center gap-1 text-blue-200 hover:text-white text-sm mb-2 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Environments
    </a>
    <h1 class="text-2xl font-bold text-white">{{ env.name }}</h1>
  </div>
</div>
{% endblock %}

{% block content %}
<div class="flex items-center justify-end mb-6">
  <button
    hx-delete="/backend/{{ env.name }}"
    hx-target="body"
    hx-swap="innerHTML"
    hx-confirm="Delete environment '{{ env.name }}'?"
    class="btn btn-error btn-sm btn-outline gap-1.5">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
    </svg>
    Delete
  </button>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden max-w-2xl">
  <div class="px-6 py-3 bg-gray-50 border-b border-gray-200">
    <h2 class="text-sm font-semibold text-[#4887FA]">Environment Details</h2>
  </div>
  <dl class="divide-y divide-gray-200">
    <div class="flex items-center px-6 py-4">
      <dt class="w-36 text-sm font-medium text-gray-500 flex-shrink-0">Name</dt>
      <dd class="text-sm text-gray-900 font-semibold">{{ env.name }}</dd>
    </div>
    <div class="flex items-center px-6 py-4">
      <dt class="w-36 text-sm font-medium text-gray-500 flex-shrink-0">Template</dt>
      <dd>
        <span class="badge badge-ghost badge-sm font-mono">{{ env.template }}</span>
      </dd>
    </div>
    <div class="flex items-start px-6 py-4">
      <dt class="w-36 text-sm font-medium text-gray-500 flex-shrink-0 pt-0.5">Root Path</dt>
      <dd class="text-sm text-gray-700 font-mono break-all">{{ resolved_root_path }}</dd>
    </div>
  </dl>
</div>
{% endblock %}
