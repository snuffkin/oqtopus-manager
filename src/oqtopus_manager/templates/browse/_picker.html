<div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden mt-1">
  <div class="flex items-center justify-between px-3 py-2.5 bg-gray-50 border-b border-gray-200">
    <span class="font-mono text-xs text-gray-500 truncate flex-1 mr-2">{{ current }}</span>
    <button type="button"
            onclick="document.getElementById('browse-panel').innerHTML = ''"
            class="btn btn-ghost btn-xs rounded-full text-gray-400 hover:text-gray-600">✕</button>
  </div>

  <ul class="max-h-56 overflow-y-auto divide-y divide-gray-100">
    {% if parent is not none %}
    <li>
      <button type="button"
              hx-get="/browse?path={{ parent | urlencode }}"
              hx-target="#browse-panel"
              hx-swap="innerHTML"
              class="flex items-center gap-2 w-full px-3 py-2.5 hover:bg-gray-50 text-gray-500 hover:text-gray-700 text-sm transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
        <span class="font-mono">..</span>
      </button>
    </li>
    {% endif %}

    {% for entry in entries %}
    <li class="flex items-center justify-between px-3 py-2.5 hover:bg-[#EFF4FF] group transition-colors">
      <button type="button"
              hx-get="/browse?path={{ entry | string | urlencode }}"
              hx-target="#browse-panel"
              hx-swap="innerHTML"
              class="flex items-center gap-2 flex-1 text-left text-sm text-gray-800">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-yellow-400 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 7c0-1.1.9-2 2-2h5l2 2h7a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>
        </svg>
        <span class="font-mono text-xs">{{ entry.name }}</span>
      </button>
      <button type="button"
              onclick="document.getElementById('root_path').value = '{{ entry }}'; document.getElementById('browse-panel').innerHTML = '';"
              class="btn btn-primary btn-xs opacity-0 group-hover:opacity-100 transition-opacity ml-2">
        Select
      </button>
    </li>
    {% endfor %}

    {% if not entries %}
    <li class="px-3 py-8 text-gray-400 text-sm text-center">No subdirectories</li>
    {% endif %}
  </ul>
</div>
