{% extends "base.html" %}
{% block title %}API Docs — OQTOPUS Manager{% endblock %}

{% block page_banner %}
<div class="relative overflow-hidden px-8 py-8" style="background: url('/assets/mv_bg.png') center/cover no-repeat; background-color: #2563eb;">
  {% include "_banner_svg.html" %}
  <div class="relative">
    <h1 class="text-2xl font-bold text-white">API Documentation</h1>
    <p class="text-blue-100 text-sm mt-1">Interactive REST API reference powered by Swagger UI.</p>
  </div>
</div>
{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden" style="height: calc(100vh - 15rem);">
  <iframe id="swagger-frame" src="/docs" class="w-full h-full border-0" title="Swagger UI"
    onload="injectSwaggerStyles(this)"></iframe>
</div>
<script>
  function injectSwaggerStyles(frame) {
    try {
      var doc = frame.contentDocument || frame.contentWindow.document;
      var style = doc.createElement('style');
      style.textContent = [
        '.swagger-ui .info .title { font-size: 1.25rem !important; }',
        '.swagger-ui .info { margin: 16px 0 !important; }',
        '.swagger-ui .info .description p { font-size: 0.8125rem !important; }',
        '.swagger-ui .opblock-tag { font-size: 0.9375rem !important; }',
        '.swagger-ui .opblock-summary-description { font-size: 0.8125rem !important; }',
        '.swagger-ui .opblock-summary-path { font-size: 0.8125rem !important; }',
        '.swagger-ui .opblock .opblock-summary-operation-id { font-size: 0.75rem !important; }',
        '.swagger-ui .scheme-container { padding: 8px 0 !important; }',
        '.swagger-ui select, .swagger-ui input { font-size: 0.8125rem !important; }',
        '.swagger-ui table thead tr th, .swagger-ui table tbody tr td { font-size: 0.8125rem !important; }',
        '.swagger-ui .parameter__name, .swagger-ui .parameter__type { font-size: 0.8125rem !important; }',
        '.swagger-ui .response-col_status { font-size: 0.8125rem !important; }',
        '.swagger-ui .btn { font-size: 0.8125rem !important; }',
      ].join('\n');
      doc.head.appendChild(style);
    } catch (e) {}
  }
</script>
{% endblock %}
