name: Release
on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      # ----------------------------
      # Setup
      # ----------------------------
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Set up Python
        run: uv python install

      # ----------------------------
      # Build
      # ----------------------------
      - name: Build
        run: uv build

      # ----------------------------
      # Publish to PyPI
      # ----------------------------
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
